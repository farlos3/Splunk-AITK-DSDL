name: splunkaitk

services:
  splunk:
    image: splunk/splunk:latest
    # Splunk publishes amd64 images only. On Apple Silicon (M1/M2/M3/M4)
    # this forces Docker Desktop to run via Rosetta 2 emulation; on
    # Windows/Linux x86 it's a no-op.
    platform: linux/amd64
    container_name: splunk-aitk
    hostname: splunk-aitk
    environment:
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD:-p@ssw0rd}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN:-aitk-hec-token-CHANGE-ME}
      # AITK/MLTK + PSC + DSDL are installed at first boot from the .tgz
      # files you stage in ../splunk-apps/. setup.ps1 / setup.sh discovers
      # them and writes this variable into docker/.env. The splunk-ansible
      # entrypoint installs each archive (in listed order) into
      # /opt/splunk/etc/apps. PSC must come before MLTK before DSDL.
      - SPLUNK_APPS_URL=${SPLUNK_APPS_URL:-}
    ports:
      - "8000:8000"      # Web UI
      - "8088:8088"      # HTTP Event Collector
      - "8089:8089"      # Management API (DSDL containers call back here)
      - "9997:9997"      # Forwarder receiver
    volumes:
      # Persistent Splunk config + state. /opt/splunk/etc holds the
      # installed AITK/PSC/DSDL apps and DSDL's saved container config;
      # /opt/splunk/var holds indexes and _internal logs. Both are
      # provisioned on first boot when the named volume is empty, and
      # survive `docker compose restart` / `reset` (killed only by `down -v`
      # or reset -Full). Named volumes (not Windows bind mounts) so Splunk's
      # validatedb is happy — same reasoning as the BOTS lab.
      - splunk-etc:/opt/splunk/etc
      - splunk-var:/opt/splunk/var
      # BOTSv1 dataset for the DGA detection POC — this project's OWN volume
      # (splunkaitk_splunk-botsv1), fully self-contained and independent of
      # Splunk-Environment-Lab. Populated by setup.* from this repo's own
      # bots-data/botsv1/ (downloaded there if absent). The mount target MUST
      # be `botsv1_data_set` because the archive's indexes.conf hardcodes that
      # app name in its bucket paths. An empty volume = empty app dir, which
      # Splunk simply ignores.
      - splunk-botsv1:/opt/splunk/etc/apps/botsv1_data_set
      # App packages to auto-install. Read-only bind mount of small .tgz
      # files is fine on Windows (ansible just untars them at boot; they're
      # never mmap'd as index buckets, which is the case Docker Desktop's
      # gRPC-FUSE share can't handle).
      - ../splunk-apps:/tmp/apps:ro
      # NOTE: we deliberately do NOT mount /var/run/docker.sock here. The
      # splunk process runs as uid 41812 and can't read the root-owned
      # socket ("Permission denied" in DSDL's Test & Save). Instead DSDL
      # talks to the docker-proxy service below over TCP. In the DSDL Setup
      # page use Docker Host:  tcp://docker-proxy:2375
    restart: unless-stopped
    depends_on:
      - docker-proxy
    healthcheck:
      # Hit the web login page (returns HTTP 200 without auth). The mgmt
      # endpoint /services/server/info returns 401 unauthenticated, which
      # `curl -f` reports as failure -> false "unhealthy". The login page is
      # a true "Splunk Web is serving" signal.
      test: ["CMD-SHELL", "curl -fks http://localhost:8000/en-US/account/login >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # Filtered, read-mostly gateway to the host Docker daemon. It runs as root
  # (so it CAN read the socket) and exposes a scoped HTTP Docker API on
  # tcp://docker-proxy:2375, reachable by the splunk container over the
  # compose network. This sidesteps the socket-permission problem entirely
  # and only allows the API groups DSDL needs (create/start/stop containers,
  # pull images, inspect networks/volumes). The DSDL-spawned model containers
  # still run on the HOST Docker as siblings; Splunk reaches their published
  # ports via Endpoint URL = host.docker.internal.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: dsdl-docker-proxy
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - INFO=1
      - VERSION=1
      - EXEC=1
      - POST=1          # allow write ops (create/start/stop/remove); default is read-only
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # DSDL "golden image" model + JupyterLab dev container, managed by compose
  # so it's always available and predictable (instead of relying on DSDL's
  # Containers page to spawn one). It runs in DEV mode (MODE_DEV_PROD=DEV),
  # which is what makes the golden image start JupyterLab — a plain run only
  # starts the API. Inside the container it serves over HTTPS (self-signed cert):
  #   :5000  model API   -> DSDL fit/apply target (Endpoint URL host.docker.internal)
  #   :8888  JupyterLab  -> open https://localhost:8888  (HTTPS! not http)
  #   :6006  TensorBoard
  # HEADS-UP — golden and the DSDL LLM-RAG container share the DSDL "dev slot"
  # (host :5000/:8888/:6006) and are MUTUALLY EXCLUSIVE there. To run LLM Chat
  # you start the LLM-RAG image from DSDL -> Container Management (pick "Agentic
  # AI" :agentic-ai-5.2.4 — the "Red Hat LLM RAG CPU" :5.2.4 tag crashes on boot,
  # missing langgraph). It also wants those host ports. Two ways to avoid the clash:
  #   (a) stop golden first:  docker stop mltk-dev   (frees the ports; simplest)
  #   (b) keep golden running but move its HOST ports via docker/.env:
  #         MLTK_DEV_API_PORT=5001  MLTK_DEV_JUPYTER_PORT=8889  MLTK_DEV_TB_PORT=6007
  #       golden's JupyterLab then lives at https://localhost:8889 and the LLM-RAG
  #       container takes host :5000. Caveat: in (b) DSDL's :5000 endpoint now
  #       points at LLM-RAG, so MLTKContainer fit/apply (e.g. the DGA POC) won't
  #       reach golden until golden is back on host :5000.
  # See docs/GUIDE.md 5.1 and poc/mcp/README.md Step 2 for the full walkthrough.
  mltk-dev:
    image: ${GOLDEN_IMAGE:-splunk/mltk-container-golden-cpu:5.2.3}
    platform: linux/amd64
    container_name: mltk-dev
    environment:
      - MODE_DEV_PROD=DEV
      # Jupyter password is "splunkdsdl" (this is the sha1 hash of it).
      # Override by setting JUPYTER_PASSWD to another hash in docker/.env.
      - JUPYTER_PASSWD=${JUPYTER_PASSWD:-sha1:6a98ab1ca809:71198af5aadebf82c8416ed926141b46392716ea}
    ports:
      # Defaults match the DSDL dev slot (5000/8888/6006). Override these in
      # docker/.env to free the host ports for the LLM-RAG container while keeping
      # golden running — see the HEADS-UP note above. Only the HOST side moves;
      # golden still listens on 5000/8888/6006 inside the container.
      - "${MLTK_DEV_API_PORT:-5000}:5000"        # model API (HTTPS)
      - "${MLTK_DEV_JUPYTER_PORT:-8888}:8888"    # JupyterLab (HTTPS)
      - "${MLTK_DEV_TB_PORT:-6006}:6006"         # TensorBoard
    volumes:
      - mltk-container-data:/srv
    restart: unless-stopped

  # Local LLM backend for the DSDL "LLM Integrations" assistants (LLM Chat,
  # Querying LLM, RAG). Fully local, no API key, no per-token cost — the right
  # default for a teaching sandbox. The DSDL LLM-RAG container (which you start
  # from DSDL -> Container Management) talks to this over the published port via
  # host.docker.internal, the SAME pattern Splunk uses to reach model
  # containers (see notes above). That avoids coupling to whichever network
  # DSDL spawns the LLM-RAG container on.
  #
  # In the DSDL "Setup LLM Integrations" page set:
  #   LLM Service = Ollama,  Enable Ollama = Yes
  #   Ollama URL  = http://host.docker.internal:11434
  #   Model Name  = the model you pulled below (default: llama3.2:3b)
  #
  # After `docker compose up`, pull a model (small = fast on CPU):
  #   docker exec ollama ollama pull llama3.2:3b
  # CPU-only by default; works everywhere. For GPU, add a `deploy.resources`
  # reservation — not needed for the POC.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    hostname: ollama
    ports:
      - "11434:11434"      # Ollama HTTP API
    volumes:
      - ollama-data:/root/.ollama   # cached model weights survive restarts
    restart: unless-stopped

# Predictable network name so the splunk container can resolve the docker-proxy
# by name, and so a DSDL-spawned container can join it. In the DSDL Setup page,
# set "Docker network" to "splunk-dsdl" — REQUIRED for the LLM-RAG assistants:
# DSDL reaches the LLM-RAG container it spawns by name on this shared network, so
# without it the container lands on the default bridge net and the assistants fail
# with "Could not create search" / "BACKEND UNREACHABLE". (The DGA POC, which uses
# the compose-run golden via host.docker.internal:5000, doesn't need it.)
networks:
  default:
    name: splunk-dsdl

volumes:
  splunk-etc:
  splunk-var:
  splunk-botsv1:
  mltk-container-data:
  ollama-data:
